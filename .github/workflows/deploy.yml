name: Auto Deploy to SiteGround via SSH (Rsync)

on:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # 1. DEPLOY APP-CORE
      # Akan dikirim ke: {TARGET_PATH}/app-core/
      - name: Deploy Core Files (app-core)
        uses: easingthemes/ssh-deploy@main
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SITEGROUND_SSH_PRIVATE_KEY }}
          ARGS: "-rlgoDzvc -i --delete"
          SOURCE: "app-core/"
          REMOTE_HOST: "35.213.150.39"
          REMOTE_USER: ${{ secrets.SITEGROUND_SSH_USERNAME }}
          REMOTE_PORT: ${{ secrets.SITEGROUND_SSH_PORT || '18765' }}
          TARGET: "${{ secrets.SITEGROUND_SSH_TARGET_PATH }}/app-core/"
          # /vendor/ WAJIB dikecualikan: repositori tidak menyertakannya, dan
          # ARGS memakai --delete. Tanpa pengecualian ini rsync menghapus
          # vendor/ di server pada setiap deploy, sehingga 'php spark migrate'
          # pada langkah Post-Deploy gagal bila composer install tidak berhasil
          # membangunnya kembali.
          EXCLUDE: "/node_modules/, /vendor/, /.git/, /.env, /writable/cache/, /writable/session/, /tests/"

      # 2. DEPLOY PUBLIC_HTML
      # Akan dikirim ke: {TARGET_PATH}/public_html/
      - name: Deploy Public Files (public_html)
        uses: easingthemes/ssh-deploy@main
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SITEGROUND_SSH_PRIVATE_KEY }}
          ARGS: "-rlgoDzvc -i"
          SOURCE: "./"
          REMOTE_HOST: "35.213.150.39"
          REMOTE_USER: ${{ secrets.SITEGROUND_SSH_USERNAME }}
          REMOTE_PORT: ${{ secrets.SITEGROUND_SSH_PORT || '18765' }}
          TARGET: "${{ secrets.SITEGROUND_SSH_TARGET_PATH }}/public_html/"
          EXCLUDE: "/node_modules/, /.git/, /app-core/, /.env, /.github/, /.vscode/, /.gemini/, /scratch/, /*.md, /database.sql"

      # 3. RUN POST-DEPLOY COMMANDS
      - name: Post-Deploy Scripts
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: "35.213.150.39"
          username: ${{ secrets.SITEGROUND_SSH_USERNAME }}
          key: ${{ secrets.SITEGROUND_SSH_PRIVATE_KEY }}
          port: ${{ secrets.SITEGROUND_SSH_PORT || '18765' }}
          # script_stop WAJIB true. Bawaannya false, sehingga perintah yang gagal
          # di bawah TIDAK menggagalkan langkah ini — deploy tetap hijau meskipun
          # migrasi tidak pernah diterapkan. Justru karena itu tabel `migrations`
          # di produksi berhenti di 2026-02-01 sementara seluruh deploy dilaporkan
          # "success", dan kolom-kolom baru tidak pernah terbentuk.
          script_stop: true
          script: |
            set -e
            cd ${{ secrets.SITEGROUND_SSH_TARGET_PATH }}/app-core
            composer install --no-dev --optimize-autoloader
            php spark migrate
            # Tampilkan hasil akhir agar mudah diperiksa di log Actions.
            php spark migrate:status
