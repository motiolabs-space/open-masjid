# Test deploy trigger - fixed secrets
name: Auto Deploy to SiteGround (Split Paths)

on:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 1. DEPLOY CORE FILES (app-core/ -> /app-core/ di luar public_html)
      - name: Deploy Core Files (app-core)
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.SITEGROUND_FTP_HOST }}
          username: ${{ secrets.SITEGROUND_FTP_USERNAME }}
          password: ${{ secrets.SITEGROUND_FTP_PASSWORD }}
          port: ${{ secrets.SITEGROUND_FTP_PORT || 21 }} # Menggunakan port default FTP (21)
          local-dir: app-core/
          server-dir: app-core/
          state-name: .ftp-deploy-sync-state-v2.json
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/.env
            **/writable/**
            **/tests/**
            **/phpunit.xml.dist
            **/README.md

      # 2. DEPLOY PUBLIC FILES (Root files & assets -> /public_html/)
      - name: Deploy Public Files (public_html)
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.SITEGROUND_FTP_HOST }}
          username: ${{ secrets.SITEGROUND_FTP_USERNAME }}
          password: ${{ secrets.SITEGROUND_FTP_PASSWORD }}
          port: ${{ secrets.SITEGROUND_FTP_PORT || 21 }} # Menggunakan port default FTP (21)
          local-dir: ./
          server-dir: public_html/
          state-name: .ftp-deploy-sync-state-v2.json
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/app-core/**
            **/.env
            **/README.md
            **/.vscode/**
            **/.idea/**
            **/.gemini/**
            **/user.md
            **/project_brief.md
            **/prefixes.txt
            **/database.sql
